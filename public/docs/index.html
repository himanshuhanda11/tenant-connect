<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIReatro Platform Documentation</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; line-height: 1.7; }
    .container { max-width: 900px; margin: 0 auto; padding: 40px 24px; }
    .header { text-align: center; padding: 40px 0 30px; border-bottom: 1px solid #1e293b; margin-bottom: 40px; }
    .header h1 { font-size: 2rem; color: #fff; margin-bottom: 8px; }
    .header p { color: #94a3b8; font-size: 0.9rem; }
    .download-bar { display: flex; gap: 12px; justify-content: center; margin-top: 16px; }
    .download-bar a { background: #6366f1; color: #fff; padding: 8px 20px; border-radius: 8px; text-decoration: none; font-size: 0.85rem; font-weight: 500; }
    .download-bar a:hover { background: #818cf8; }
    #content { color: #cbd5e1; }
    #content h1 { display: none; }
    #content h2 { font-size: 1.5rem; color: #fff; margin: 48px 0 16px; padding-bottom: 8px; border-bottom: 1px solid #1e293b; }
    #content h3 { font-size: 1.15rem; color: #e2e8f0; margin: 28px 0 12px; }
    #content h4 { font-size: 1rem; color: #c084fc; margin: 20px 0 8px; }
    #content p { margin: 10px 0; }
    #content ul, #content ol { padding-left: 24px; margin: 10px 0; }
    #content li { margin: 4px 0; }
    #content table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.9rem; }
    #content th { background: #1e293b; color: #e2e8f0; padding: 10px 14px; text-align: left; border: 1px solid #334155; }
    #content td { padding: 8px 14px; border: 1px solid #334155; }
    #content tr:nth-child(even) { background: #1e293b40; }
    #content code { background: #1e293b; padding: 2px 6px; border-radius: 4px; font-size: 0.85em; color: #a78bfa; }
    #content pre { background: #1e293b; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 12px 0; }
    #content pre code { background: none; padding: 0; }
    #content strong { color: #f1f5f9; }
    #content a { color: #818cf8; }
    #content hr { border: none; border-top: 1px solid #1e293b; margin: 32px 0; }
    #content blockquote { border-left: 3px solid #6366f1; padding-left: 16px; color: #94a3b8; margin: 12px 0; }
    @media print { body { background: #fff; color: #000; } #content h2 { color: #000; } #content td, #content th { border-color: #ccc; } .download-bar { display: none; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>AIReatro Platform Documentation</h1>
      <p>Version 1.0 — February 2026 — Complete Technical Reference</p>
      <div class="download-bar">
        <a href="AIReatro-Platform-Documentation.md" download>⬇ Download Markdown</a>
        <a href="javascript:window.print()">🖨 Print / Save as PDF</a>
      </div>
    </div>
    <div id="content">Loading documentation...</div>
  </div>
  <script>
    fetch('AIReatro-Platform-Documentation.md')
      .then(r => r.text())
      .then(md => { document.getElementById('content').innerHTML = marked.parse(md); })
      .catch(() => { document.getElementById('content').innerHTML = '<p>Failed to load documentation.</p>'; });
  </script>
</body>
</html>
